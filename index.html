<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ফিফা বিশ্বকাপ ২০২৬ — ফিক্সচার</title>

<style>
  :root {
    --green: #1a6b3c;
    --green-light: #2d9e5f;
    --green-dark: #0f3d22;
    --gold: #f5c518;
    --gold-light: #ffd84d;
    --bg: #0a1a10;
    --card-bg: #0f2518;
    --card-border: #1e4a2e;
    --text: #e8f5ee;
    --text-muted: #7ab890;
    --white: #ffffff;
    --red: #e74c3c;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tiro Bangla', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(26,107,60,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(245,197,24,0.05) 0%, transparent 60%);
  }

  header {
    background: linear-gradient(135deg, var(--green-dark) 0%, #0d2b18 50%, #061510 100%);
    border-bottom: 2px solid var(--gold);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.6);
  }
  .header-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  .trophy-icon {
    font-size: 2.2rem;
    filter: drop-shadow(0 0 8px rgba(245,197,24,0.6));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)}
  }
  .header-text h1 {
    font-size: 1.5rem; color: var(--gold);
    line-height: 1.2; font-weight: 700;
  }
  .header-text p { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
  .header-badge {
    margin-left: auto;
    background: var(--gold); color: var(--green-dark);
    font-size: 0.72rem; font-weight: 700;
    padding: 4px 10px; border-radius: 20px; white-space: nowrap;
  }

  .filters-section {
    background: var(--card-bg);
    border-bottom: 1px solid var(--card-border);
    padding: 12px 16px;
  }
  .filters-inner { max-width: 1100px; margin: 0 auto; }
  .filters-label {
    font-size: 0.75rem; color: var(--text-muted);
    letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .filter-row { display: flex; flex-wrap: wrap; gap: 8px; }
  select {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 7px 12px; border-radius: 8px;
    font-family: 'Tiro Bangla', serif; font-size: 0.88rem;
    cursor: pointer; outline: none;
    transition: border-color 0.2s, background 0.2s;
    flex: 1; min-width: 160px;
  }
  select:focus { border-color: var(--gold); background: rgba(245,197,24,0.05); }
  select option { background: #0f2518; }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--text-muted);
    color: var(--text-muted);
    padding: 7px 16px; border-radius: 8px;
    font-family: 'Tiro Bangla', serif; font-size: 0.88rem;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .btn-reset:hover { border-color: var(--red); color: var(--red); }

  .stats-bar {
    max-width: 1100px; margin: 12px auto 0;
    padding: 0 16px;
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
  }
  .stat-item { font-size: 0.82rem; color: var(--text-muted); }
  .stat-item span { color: var(--gold); font-weight: 700; }

  main { max-width: 1100px; margin: 0 auto; padding: 14px 16px; }

  .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab-btn {
    background: transparent;
    border: 1px solid var(--card-border);
    color: var(--text-muted);
    padding: 7px 16px; border-radius: 20px;
    font-family: 'Tiro Bangla', serif; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--green); border-color: var(--green-light); color: var(--white);
  }

  .day-group { margin-bottom: 22px; }
  .day-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px; padding: 8px 14px;
    background: linear-gradient(90deg, rgba(26,107,60,0.3) 0%, transparent 100%);
    border-left: 3px solid var(--green-light);
    border-radius: 0 8px 8px 0;
  }
  .day-name { font-size: 1rem; color: var(--gold); font-weight: 700; }
  .day-date { font-size: 0.78rem; color: var(--text-muted); }
  .day-count {
    margin-left: auto;
    background: rgba(26,107,60,0.4);
    color: var(--green-light);
    font-size: 0.72rem; padding: 2px 8px; border-radius: 10px;
  }

  .matches-grid { display: grid; gap: 10px; }
  .match-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px; padding: 12px 16px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center; gap: 8px;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .match-card::before {
    content:''; position:absolute; top:0;left:0;right:0; height:2px;
    background: linear-gradient(90deg, var(--green-light), var(--gold), var(--green-light));
    opacity:0; transition:opacity 0.2s;
  }
  .match-card:hover { transform:translateY(-2px); border-color:var(--green-light); box-shadow:var(--shadow); }
  .match-card:hover::before { opacity:1; }

  .team { display:flex; align-items:center; gap:10px; }
  .team.right { flex-direction:row-reverse; text-align:right; }

  .team-flag {
    width: 36px; height: 26px;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    line-height: 1;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  }

  .team-name { font-size: 0.92rem; font-weight: 700; color: var(--white); line-height:1.2; }
  .team-name-en { font-size:0.66rem; color:var(--text-muted); font-weight:400; margin-top:1px; font-family: sans-serif; }

  .match-center {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    min-width: 95px;
  }
  .vs-badge {
    background: rgba(245,197,24,0.12);
    border: 1px solid rgba(245,197,24,0.3);
    color: var(--gold);
    font-size: 0.9rem; font-weight: 700;
    padding: 3px 10px; border-radius:6px;
    font-family: sans-serif; letter-spacing:1px;
  }
  .match-time { font-size:0.78rem; color:var(--gold-light); font-weight:700; white-space:nowrap; }
  .match-group {
    font-size:0.68rem;
    background:rgba(26,107,60,0.4); color:var(--green-light);
    padding:2px 7px; border-radius:4px; white-space:nowrap;
  }

  .match-meta {
    grid-column: 1 / -1;
    display:flex; flex-wrap:wrap; gap:8px; align-items:center;
    padding-top:8px;
    border-top:1px solid rgba(255,255,255,0.05);
    margin-top:2px;
  }
  .meta-badge { display:flex; align-items:center; gap:4px; font-size:0.72rem; color:var(--text-muted); }

  .no-results { text-align:center; padding:60px 20px; color:var(--text-muted); }
  .no-results .icon { font-size:3rem; margin-bottom:12px; }

  /* GROUPS TAB */
  .groups-container {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:12px;
  }
  .group-card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:12px; overflow:hidden; }
  .group-title {
    background:linear-gradient(135deg,var(--green-dark),#0d2b18);
    padding:8px 14px; font-size:0.95rem; font-weight:700;
    color:var(--gold); border-bottom:1px solid var(--card-border);
  }
  .group-team-row {
    display:flex; align-items:center; gap:8px; padding:7px 14px;
    font-size:0.85rem; border-bottom:1px solid rgba(255,255,255,0.04);
    transition:background 0.15s;
  }
  .group-team-row:last-child { border-bottom:none; }
  .group-team-row:hover { background:rgba(255,255,255,0.03); }
  .group-flag { font-size:1.3rem; line-height:1; }

  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--green);border-radius:3px}
  .hidden { display:none !important; }

  @media(max-width:600px){
    .header-text h1{font-size:1.2rem}
    .match-card{grid-template-columns:1fr; gap:6px; padding:10px 12px;}
    .team{flex-direction:column; gap:4px; text-align:center;}
    .team.right{flex-direction:column;}
    .match-center{flex-direction:row; justify-content:center; min-width:unset; flex-wrap:wrap; gap:6px;}
    .team-name{text-align:center}
    .match-meta{justify-content:center}
    .groups-container{grid-template-columns:1fr 1fr}
    select{min-width:130px}
  }
  @media(max-width:380px){
    .groups-container{grid-template-columns:1fr}
  }
  /* LIVE BAR */
  .live-bar {
    background: linear-gradient(90deg, #7b0000 0%, #b10000 40%, #7b0000 100%);
    background-size: 200% 100%;
    animation: livePulse 3s ease-in-out infinite;
    border-bottom: 1px solid rgba(255,80,80,0.3);
    padding: 0;
  }
  @keyframes livePulse {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  .live-bar-inner {
    max-width: 1100px; margin: 0 auto;
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap; justify-content: center;
  }
  .live-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #ff4444;
    box-shadow: 0 0 8px #ff4444;
    animation: blink 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .live-badge-text {
    background: #ff2222;
    color: #fff;
    font-size: 0.7rem; font-weight: 700;
    padding: 2px 8px; border-radius: 4px;
    letter-spacing: 1px; font-family: sans-serif;
    flex-shrink: 0;
  }
  .live-bar-msg {
    font-size: 0.88rem; color: #ffe0e0; font-weight: 600;
    flex: 1; text-align: center;
  }
  .live-bar-link {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 0.82rem; font-weight: 700;
    padding: 5px 14px; border-radius: 20px;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
    white-space: nowrap; flex-shrink: 0;
    font-family: sans-serif;
  }
  .live-bar-link:hover {
    background: rgba(255,255,255,0.28);
    transform: scale(1.04);
  }
  @media(max-width:480px){
    .live-bar-msg{ font-size:0.78rem; }
  }

  /* FOOTER */
  footer {
    margin-top: 40px;
    border-top: 1px solid var(--card-border);
    background: linear-gradient(135deg, var(--green-dark), #061510);
    padding: 24px 16px;
    text-align: center;
  }
  .footer-inner { max-width: 1100px; margin: 0 auto; }
  .footer-source {
    font-size: 0.78rem; color: var(--text-muted);
    margin-bottom: 10px;
    display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap;
  }
  .footer-source span { color: var(--gold); font-weight: 600; }
  .footer-credit {
    font-size: 0.82rem; color: var(--text-muted);
    line-height: 1.6;
  }
  .footer-credit a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 700;
    border-bottom: 1px dashed rgba(245,197,24,0.4);
    transition: color 0.2s, border-color 0.2s;
  }
  .footer-credit a:hover {
    color: var(--gold-light);
    border-color: var(--gold-light);
  }
  .footer-ball { font-size: 1.3rem; animation: spin 4s linear infinite; display: inline-block; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="trophy-icon">🏆</div>
    <div class="header-text">
      <h1>ফিফা বিশ্বকাপ ২০২৬</h1>
      <p>সম্পূর্ণ ফিক্সচার · বাংলাদেশ সময়</p>
    </div>
    <div class="header-badge">🇧🇩 BST</div>
  </div>
</header>

<!-- LIVE BAR -->
<div class="live-bar">
  <div class="live-bar-inner">
    <div class="live-dot"></div>
    <span class="live-badge-text">LIVE</span>
    <span class="live-bar-msg">⚽ বিশ্বকাপের লাইভ ম্যাচ !</span>
    <a class="live-bar-link" href="https://livefy1.blogspot.com/" target="_blank" rel="noopener">
      ▶ এখনে দেখুন
    </a>
  </div>
</div>

<div class="filters-section">
  <div class="filters-inner">
    <div class="filters-label">🔍 ফিল্টার করুন</div>
    <div class="filter-row">
      <select id="filterGroup" onchange="applyFilters()">
        <option value="">সব গ্রুপ / পর্ব</option>
        <option value="A">গ্রুপ এ</option>
        <option value="B">গ্রুপ বি</option>
        <option value="C">গ্রুপ সি</option>
        <option value="D">গ্রুপ ডি</option>
        <option value="E">গ্রুপ ই</option>
        <option value="F">গ্রুপ এফ</option>
        <option value="G">গ্রুপ জি</option>
        <option value="H">গ্রুপ এইচ</option>
        <option value="I">গ্রুপ আই</option>
        <option value="J">গ্রুপ জে</option>
        <option value="K">গ্রুপ কে</option>
        <option value="L">গ্রুপ এল</option>
        <option value="R32">শেষ ৩২</option>
        <option value="R16">শেষ ১৬</option>
        <option value="QF">কোয়ার্টার ফাইনাল</option>
        <option value="SF">সেমি ফাইনাল</option>
        <option value="3PL">তৃতীয় স্থান</option>
        <option value="FIN">ফাইনাল</option>
      </select>
      <select id="filterTeam" onchange="applyFilters()">
        <option value="">সব দল</option>
      </select>
      <button class="btn-reset" onclick="resetFilters()">↺ রিসেট</button>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item">মোট ম্যাচ: <span id="totalCount">0</span></div>
  <div class="stat-item">দেখাচ্ছে: <span id="shownCount">0</span></div>
</div>

<main>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('fixtures',this)">📅 ফিক্সচার</button>
    <button class="tab-btn" onclick="showTab('groups',this)">👥 গ্রুপ</button>
  </div>

  <div id="tab-fixtures">
    <div id="matchesContainer"></div>
    <div id="noResults" class="no-results hidden">
      <div class="icon">⚽</div>
      <p>কোনো ম্যাচ পাওয়া যায়নি।</p>
    </div>
  </div>

  <div id="tab-groups" class="hidden">
    <div class="groups-container" id="groupsContainer"></div>
  </div>
</main>

function teamHTML(name, isRight) {
  const info = TEAMS[name];
  const flagHTML = info
    ? `<img src="https://flagcdn.com/w40/${info.code}.png"
           width="36" height="24"
           style="border-radius:3px;object-fit:cover;flex-shrink:0;display:block;box-shadow:0 1px 4px rgba(0,0,0,0.5)"
           alt="${info.en}"
           onerror="this.style.display='none'">`
    : `<span style="font-size:1.2rem;flex-shrink:0">🏳️</span>`;
  const enName = info ? `<div class="team-name-en">${info.en}</div>` : '';
  if (isRight) {
    return `<div class="team right">
      ${flagHTML}
      <div><div class="team-name">${name}</div>${enName}</div>
    </div>`;
  }
  return `<div class="team">
    ${flagHTML}
    <div><div class="team-name">${name}</div>${enName}</div>
  </div>`;
}

function renderFixtures(list) {
  const cont = document.getElementById('matchesContainer');
  const noRes = document.getElementById('noResults');
  document.getElementById('shownCount').textContent = list.length;
  if (!list.length) { cont.innerHTML=''; noRes.classList.remove('hidden'); return; }
  noRes.classList.add('hidden');

  const byDate = {};
  list.forEach(f => { if(!byDate[f.date]) byDate[f.date]=[]; byDate[f.date].push(f); });

  let html = '';
  Object.keys(byDate).sort().forEach(date => {
    const ms = byDate[date];
    html += `<div class="day-group">
      <div class="day-header">
        <span class="day-name">${fmtDate(date)}</span>
        <span class="day-count">${ms.length}টি ম্যাচ</span>
      </div>
      <div class="matches-grid">`;
    ms.forEach(f => {
      const grpLabel = f.matchNo
        ? `${f.matchNo} · ${f.phase}`
        : `গ্রুপ ${f.g} · ${f.phase}`;
      html += `<div class="match-card">
        ${teamHTML(f.t1, false)}
        <div class="match-center">
          <div class="vs-badge">VS</div>
          <div class="match-time">⏰ ${f.t}</div>
          <div class="match-group">${grpLabel}</div>
        </div>
        ${teamHTML(f.t2, true)}
        <div class="match-meta">
          <span class="meta-badge">🏟️ ${f.v}${VENUE_COUNTRY[f.v] ? ', <span style="color:var(--gold-light)">'+VENUE_COUNTRY[f.v]+'</span>' : ''}</span>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  cont.innerHTML = html;
}

function populateTeamFilter() {
  const sel = document.getElementById('filterTeam');
  const teams = new Set();
  F.forEach(f => { if(TEAMS[f.t1]) teams.add(f.t1); if(TEAMS[f.t2]) teams.add(f.t2); });
  [...teams].sort().forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    sel.appendChild(o);
  });
}

function applyFilters() {
  const grp = document.getElementById('filterGroup').value;
  const team = document.getElementById('filterTeam').value;
  const filtered = F.filter(f => {
    if(grp && f.g !== grp) return false;
    if(team && f.t1 !== team && f.t2 !== team) return false;
    return true;
  });
  renderFixtures(filtered);
}

function resetFilters() {
  document.getElementById('filterGroup').value = '';
  document.getElementById('filterTeam').value = '';
  renderFixtures(F);
}

function renderGroups() {
  const cont = document.getElementById('groupsContainer');
  let html = '';
  Object.entries(GROUPS).forEach(([g, teams]) => {
    html += `<div class="group-card"><div class="group-title">গ্রুপ ${g}</div><div>`;
    teams.forEach(t => {
      const info = TEAMS[t];
      const flag = info
        ? `<img src="https://flagcdn.com/w40/${info.code}.png" width="28" height="19"
               style="border-radius:2px;object-fit:cover" alt="${info.en}"
               onerror="this.style.display='none'">`
        : '🏳️';
      html += `<div class="group-team-row">${flag}<span>${t}</span></div>`;
    });
    html += `</div></div>`;
  });
  cont.innerHTML = html;
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['fixtures','groups'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
  document.getElementById('tab-'+tab).classList.remove('hidden');
}

populateTeamFilter();
renderFixtures(F);
renderGroups();
document.getElementById('totalCount').textContent = F.length;
document.getElementById('shownCount').textContent = F.length;
</script>
